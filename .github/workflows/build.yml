name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build LexiFlow IPA
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project LexiFlow.xcodeproj \
            -scheme LexiFlow \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Archive app
        run: |
          xcodebuild archive \
            -project LexiFlow.xcodeproj \
            -scheme LexiFlow \
            -archivePath LexiFlow.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Export unsigned IPA
        run: |
          mkdir -p Payload
          cp -R LexiFlow.xcarchive/Products/Applications/LexiFlow.app Payload/
          zip -r LexiFlow-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LexiFlow-unsigned
          path: LexiFlow-unsigned.ipa

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
