name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build LexiFlow IPA
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
      - name: Fix project format for Xcode 15.4
        run: |
          if [ -f "LexiFlow.xcodeproj/project.pbxproj" ]; then
            # 查看原始值
            echo "Before fix:"
            grep -E "objectVersion|compatibilityVersion" LexiFlow.xcodeproj/project.pbxproj | head -3
            
            # 替换 objectVersion（匹配任意数字）
            sed -i '' 's/objectVersion = [0-9][0-9]*/objectVersion = 54/g' LexiFlow.xcodeproj/project.pbxproj
            
            # 替换 compatibilityVersion
            sed -i '' 's/compatibilityVersion = "Xcode [0-9][0-9.]*/compatibilityVersion = "Xcode 14.0/g' LexiFlow.xcodeproj/project.pbxproj
            
            # 验证修改
            echo "After fix:"
            grep -E "objectVersion|compatibilityVersion" LexiFlow.xcodeproj/project.pbxproj | head -3
          else
            echo "ERROR: project.pbxproj not found"
            ls -la
          fi



      - name: Run unit tests
        run: |
          xcodebuild test \
            -project LexiFlow.xcodeproj \
            -scheme LexiFlow \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Archive app
        run: |
          xcodebuild archive \
            -project LexiFlow.xcodeproj \
            -scheme LexiFlow \
            -archivePath LexiFlow.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Export unsigned IPA
        run: |
          mkdir -p Payload
          cp -R LexiFlow.xcarchive/Products/Applications/LexiFlow.app Payload/
          zip -r LexiFlow-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LexiFlow-unsigned
          path: LexiFlow-unsigned.ipa

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
